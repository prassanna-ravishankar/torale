server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't let nginx build absolute http:// redirects behind Cloudflare's
    # HTTPS termination (listen 80 otherwise leaks into the Location header).
    absolute_redirect off;
    port_in_redirect off;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Redirects for deleted docs pages — generated from .vitepress/redirects.ts.
    # Exact-match redirects go through $torale_redirect; prefix redirects are
    # concrete location blocks below.
    include /etc/nginx/nginx-redirects.conf;

    # Block crawlers on staging/preview hosts. Prod robots.txt (via VitePress
    # public/) stays authoritative.
    location = /robots.txt {
        if ($host ~* ^(staging|preview|dev|docs-staging)\.) {
            return 200 "User-agent: *\nDisallow: /\n";
        }
    }

    # Missing paths must 404 (not fall back to index.html). Google can then
    # deindex cleanly. cleanUrls in VitePress means /foo.html exists on disk;
    # serve it transparently as /foo.
    error_page 404 /404.html;
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache HTML files
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
