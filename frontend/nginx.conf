server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Canonical URLs are non-trailing-slash. Prevent nginx from building absolute
    # http:// redirects off `listen 80` behind Cloudflare's HTTPS termination.
    absolute_redirect off;
    port_in_redirect off;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP - Comprehensive protection against XSS, clickjacking, and other attacks
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.clerk.accounts.dev https://*.clerk.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.clerk.com https://*.torale.ai; connect-src 'self' https://*.torale.ai https://*.clerk.accounts.dev https://*.clerk.com https://api.clerk.com; frame-src 'self' https://*.clerk.accounts.dev https://*.clerk.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Strip trailing slash to canonical form with a single 301. Root exempted.
    rewrite ^/(.+)/$ /$1 permanent;

    # Sitemap is XML, not HTML.
    location = /sitemap.xml {
        default_type application/xml;
    }

    # Block crawlers on staging/preview hosts. Keeps the prod robots.txt
    # authoritative and prevents accidental indexing of pre-release content.
    location = /robots.txt {
        if ($host ~* ^(staging|preview|dev)\.) {
            return 200 "User-agent: *\nDisallow: /\n";
        }
        # Fall through to the static file for prod.
    }

    # SPA routing: prerender writes /route.html, served transparently as /route.
    # Fall back to index.html for client-side-only routes (auth, dashboard).
    location / {
        try_files $uri $uri.html /index.html;
    }

    # Don't cache runtime config
    location = /config.js {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
