<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/logo-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicons/logo-64.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/favicons/logo-128.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="/favicons/logo-256.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title + description are set per-page via <DynamicMeta>. react-helmet-async
         only dedupes tags it rendered, so static fallbacks here would collide. -->
    <meta property="og:site_name" content="Torale">
    <meta property="og:image" content="https://torale.ai/og-image.webp">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://torale.ai/og-image.webp">

    <!-- Warm up TLS to the API so Landing's /public/stats fetch is not gated on DNS+TLS -->
    <link rel="preconnect" href="https://api.torale.ai" crossorigin>

    <!-- Neo-Brutalist Fonts: Space Grotesk (Structure) + JetBrains Mono (Data). Self-hosted, see src/index.css. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/space-grotesk-latin.woff2" crossorigin>

    <!-- Load runtime config (deferred for better performance) -->
    <script src="/config.js" defer></script>

    <!-- Structured Data - Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Torale",
      "url": "https://torale.ai",
      "logo": "https://torale.ai/logo.svg",
      "description": "Describe what you're watching for. Torale searches the web and notifies you when your condition is met.",
      "foundingDate": "2025"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
